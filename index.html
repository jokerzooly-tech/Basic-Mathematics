<script>
// ==================== المتغيرات العامة ====================
let currentLang = "ar";
let currentPage = "home";
let currentLecture = "all";
let currentExamType = "mcq";
let currentMcqQuestions = [];
let currentEssayQuestions = [];

// ==================== تبديل اللغة ====================
function updateLanguage() {
    document.querySelectorAll('.lang-btn').forEach(btn => {
        if (btn.dataset.lang === currentLang) btn.classList.add('active');
        else btn.classList.remove('active');
    });
    document.querySelectorAll('.nav-ar').forEach(el => el.style.display = currentLang === 'ar' ? 'inline' : 'none');
    document.querySelectorAll('.nav-en').forEach(el => el.style.display = currentLang === 'en' ? 'inline' : 'none');
    document.querySelectorAll('.ar').forEach(el => el.style.display = currentLang === 'ar' ? 'inline' : 'none');
    document.querySelectorAll('.en').forEach(el => el.style.display = currentLang === 'en' ? 'inline' : 'none');
    
    const lectureLabel = document.getElementById('lectureLabel');
    if (lectureLabel) lectureLabel.innerText = currentLang === "ar" ? "📚 اختر المحاضرة:" : "📚 Select Lecture:";
    
    const select = document.getElementById('lectureSelect');
    const options = {
        all: { ar: "📖 شامل (جميع المحاضرات)", en: "📖 Comprehensive (All Lectures)" },
        lec1: { ar: "محاضرة 1: منطق العبارات", en: "Lecture 1: Logic of Compound Statements" },
        lec2: { ar: "محاضرة 2: التكافؤ المنطقي", en: "Lecture 2: Logical Equivalence" },
        lec3: { ar: "محاضرة 3: المسندات والمُكممات", en: "Lecture 3: Predicates & Quantifiers" },
        lec4: { ar: "محاضرة 4: الدوال", en: "Lecture 4: Functions" },
        lec5: { ar: "محاضرة 5: الاستقراء الرياضي", en: "Lecture 5: Mathematical Induction" },
        lec6: { ar: "محاضرة 6: نظرية المجموعات", en: "Lecture 6: Set Theory" },
        lec7: { ar: "محاضرة 7: عمليات المجموعات", en: "Lecture 7: Set Operations" },
        lec9: { ar: "محاضرة 9: العلاقات", en: "Lecture 9: Relations" },
        lec11: { ar: "محاضرة 11: تركيب الدوال", en: "Lecture 11: Function Composition" }
    };
    for (let i = 0; i < select.options.length; i++) {
        const val = select.options[i].value;
        if (options[val]) select.options[i].text = options[val][currentLang];
    }
    
    if (currentPage === 'home') renderHome();
    else if (currentPage === 'summary') renderSummary();
    else if (currentPage === 'exam') renderExam();
}
// ==================== الملخصات (باللغتين) ====================
const summariesData = {
    lec1: { ar: "القضية (Proposition) هي جملة خبرية تحتمل الصحة أو الخطأ. نرمز للقضايا بـ p, q, r. جدول الصواب يوضح جميع احتمالات الصحة والخطأ. عدد الصفوف = 2ⁿ حيث n عدد القضايا. النفي (~p): إذا كانت p صحيحة فإن ~p خاطئة والعكس. العطف (∧): p∧q صحيحة فقط عندما p و q كلاهما صحيحان. الفصل (∨): p∨q خاطئة فقط عندما p و q كلاهما خاطئان.", en: "A proposition is a declarative sentence that is either true or false. We denote propositions by p, q, r. Truth tables show all truth value possibilities. Number of rows = 2ⁿ where n is number of propositions. Negation (~p): if p is true then ~p is false. Conjunction (∧): p∧q is true only when both p and q are true. Disjunction (∨): p∨q is false only when both p and q are false." },
    lec2: { ar: "العبارة الشرطية p→q (إذا p فإن q) تكون خاطئة فقط عندما p صحيحة و q خاطئة. العبارة الثنائية الشرطية p↔q (p إذا وفقط إذا q) تكون صحيحة عندما p و q لهما نفس قيمة الصواب. المعكوس (Converse): q→p. المعكوس المعاكس (Inverse): ~p→~q. العكس (Contrapositive): ~q→~p. العكس مكافئ منطقياً للعبارة الأصلية.", en: "Conditional p→q (if p then q) is false only when p is true and q is false. Biconditional p↔q (p if and only if q) is true when p and q have the same truth value. Converse: q→p. Inverse: ~p→~q. Contrapositive: ~q→~p. The contrapositive is logically equivalent to the original statement." },
    lec3: { ar: "المسند (Predicate) هو جملة تحتوي على متغير وتصبح قضية عند تعويض قيمة للمتغير. المسور العام (∀) يعني 'لكل'، والمسور الوجودي (∃) يعني 'يوجد'. نفي ∀x P(x) هو ∃x ~P(x). نفي ∃x P(x) هو ∀x ~P(x).", en: "A predicate is a sentence containing a variable that becomes a proposition when a value is substituted. Universal quantifier (∀) means 'for all'. Existential quantifier (∃) means 'there exists'. Negation of ∀x P(x) is ∃x ~P(x). Negation of ∃x P(x) is ∀x ~P(x)." },
    lec4: { ar: "الدالة f: X→Y هي علاقة تربط كل عنصر في X (المجال) بعنصر واحد فقط في Y (المجال المقابل). المدى (Range) هو مجموعة الصور الفعلية. دالة واحد لواحد (Injective): إذا f(x₁)=f(x₂) فإن x₁=x₂. دالة شاملة (Surjective): المجال المقابل = المدى. دالة تقابل (Bijective): واحد لواحد وشاملة.", en: "Function f: X→Y associates each element in X (domain) with exactly one element in Y (codomain). Range is the set of actual images. Injective: f(x₁)=f(x₂) ⇒ x₁=x₂. Surjective: codomain = range. Bijective: both injective and surjective." },
    lec5: { ar: "الاستقراء الرياضي: لإثبات أن P(n) صحيحة لكل n≥1: 1) إثبات P(1) صحيحة (الأساس). 2) افتراض أن P(k) صحيحة (الفرضية). 3) إثبات أن P(k+1) صحيحة (الخطوة). مثال: إثبات 1+2+...+n = n(n+1)/2.", en: "Mathematical Induction: To prove P(n) true for all n≥1: 1) Prove P(1) is true (base case). 2) Assume P(k) is true (inductive hypothesis). 3) Prove P(k+1) is true (inductive step). Example: Prove 1+2+...+n = n(n+1)/2." },
    lec6: { ar: "المجموعة هي مجموعة من العناصر المحددة. A⊆B إذا كان كل عنصر في A موجود في B. A⊂B (جزئية حقيقية) إذا A⊆B و A≠B. المجموعة الخالية ∅ هي مجموعة جزئية من كل مجموعة. ترتيب المجموعة |S| هو عدد عناصرها. مجموعة القوى P(A) هي مجموعة جميع المجموعات الجزئية لـ A، وعددها 2ⁿ.", en: "A set is a collection of distinct objects. A⊆B if every element of A is in B. A⊂B (proper subset) if A⊆B and A≠B. Empty set ∅ is a subset of every set. Cardinality |S| is the number of elements. Power set P(A) is the set of all subsets of A, with size 2ⁿ." },
    lec7: { ar: "اتحاد المجموعات: A∪B = {x: x∈A أو x∈B}. تقاطع المجموعات: A∩B = {x: x∈A و x∈B}. الفرق: A-B = {x: x∈A و x∉B}. المتمم: A' = U-A. الفرق المتناظر: AΔB = (A-B)∪(B-A). قوانين دي مورجان: (A∪B)' = A'∩B' و (A∩B)' = A'∪B'.", en: "Union: A∪B = {x: x∈A or x∈B}. Intersection: A∩B = {x: x∈A and x∈B}. Difference: A-B = {x: x∈A and x∉B}. Complement: A' = U-A. Symmetric difference: AΔB = (A-B)∪(B-A). De Morgan's Laws: (A∪B)' = A'∩B' and (A∩B)' = A'∪B'." },
    lec9: { ar: "علاقة R على A: انعكاسية إذا (a,a)∈R لكل a∈A. تناظرية إذا (a,b)∈R فإن (b,a)∈R. متعدية إذا (a,b)∈R و (b,c)∈R فإن (a,c)∈R. علاقة التكافؤ هي علاقة انعكاسية وتناظرية ومتعدية. مثال: علاقة '=' هي علاقة تكافؤ.", en: "Relation R on A: Reflexive if (a,a)∈R for all a∈A. Symmetric if (a,b)∈R implies (b,a)∈R. Transitive if (a,b)∈R and (b,c)∈R implies (a,c)∈R. Equivalence relation is reflexive, symmetric, and transitive. Example: equality '=' is an equivalence relation." },
    lec11: { ar: "تركيب الدوال: (f∘g)(x) = f(g(x)). شروط التركيب: مدى g ⊆ مجال f. الدالة المحايدة I(x)=x تحقق: f∘I = f و I∘f = f. معكوس الدالة: إذا كانت f تقابلاً، فإن f⁻¹(y)=x حيث f(x)=y.", en: "Function composition: (f∘g)(x) = f(g(x)). Condition: range of g ⊆ domain of f. Identity function I(x)=x satisfies: f∘I = f and I∘f = f. Inverse function: if f is bijective, f⁻¹(y)=x where f(x)=y." }
};

// ==================== أسئلة MCQ (باللغتين) ====================
const mcqBank = {
    lec1: [
        { text: { ar: "ما هي القضية (Proposition)؟", en: "What is a proposition?" }, options: { ar: ["جملة خبرية تحتمل الصحة أو الخطأ", "جملة أمرية", "سؤال", "تعجب"], en: ["Declarative sentence that is true or false", "Imperative sentence", "Question", "Exclamation"] }, correct: { ar: "جملة خبرية تحتمل الصحة أو الخطأ", en: "Declarative sentence that is true or false" } },
        { text: { ar: "إذا كانت p صحيحة، فإن ~p تكون:", en: "If p is true, then ~p is:" }, options: { ar: ["صحيحة", "خاطئة", "غير معرفة", "مكافئة لـ p"], en: ["True", "False", "Undefined", "Equivalent to p"] }, correct: { ar: "خاطئة", en: "False" } },
        { text: { ar: "عدد الصفوف في جدول الصواب لعبارة تحتوي على 3 متغيرات هو:", en: "Number of rows in truth table for 3 variables is:" }, options: { ar: ["4", "6", "8", "16"], en: ["4", "6", "8", "16"] }, correct: { ar: "8", en: "8" } },
        { text: { ar: "العبارة p ∧ q تكون صحيحة فقط عندما:", en: "p ∧ q is true only when:" }, options: { ar: ["p صحيحة و q صحيحة", "p صحيحة و q خاطئة", "p خاطئة و q صحيحة", "p خاطئة و q خاطئة"], en: ["p true and q true", "p true and q false", "p false and q true", "p false and q false"] }, correct: { ar: "p صحيحة و q صحيحة", en: "p true and q true" } },
        { text: { ar: "الرمز ∨ يعني:", en: "The symbol ∨ means:" }, options: { ar: ["و (عطف)", "أو (فصل)", "ليس (نفي)", "إذاً (شرط)"], en: ["AND (conjunction)", "OR (disjunction)", "NOT (negation)", "IF-THEN (conditional)"] }, correct: { ar: "أو (فصل)", en: "OR (disjunction)" } }
    ],
    lec2: [
        { text: { ar: "العبارة الشرطية p → q تكون خاطئة فقط عندما:", en: "The conditional p → q is false only when:" }, options: { ar: ["p صحيحة و q صحيحة", "p صحيحة و q خاطئة", "p خاطئة و q صحيحة", "p خاطئة و q خاطئة"], en: ["p true and q true", "p true and q false", "p false and q true", "p false and q false"] }, correct: { ar: "p صحيحة و q خاطئة", en: "p true and q false" } },
        { text: { ar: "المعاكس (Contrapositive) للعبارة p → q هو:", en: "The contrapositive of p → q is:" }, options: { ar: ["q → p", "~p → ~q", "~q → ~p", "p → ~q"], en: ["q → p", "~p → ~q", "~q → ~p", "p → ~q"] }, correct: { ar: "~q → ~p", en: "~q → ~p" } },
        { text: { ar: "الطوطولوجيا (Tautology) هي عبارة:", en: "A tautology is a statement that is:" }, options: { ar: ["صحيحة دائماً", "خاطئة دائماً", "صحيحة أحياناً", "ليست قضية"], en: ["Always true", "Always false", "Sometimes true", "Not a proposition"] }, correct: { ar: "صحيحة دائماً", en: "Always true" } },
        { text: { ar: "أي من التالي يعتبر طوطولوجيا؟", en: "Which of the following is a tautology?" }, options: { ar: ["p ∧ ~p", "p ∨ ~p", "p → ~p", "~p → p"], en: ["p ∧ ~p", "p ∨ ~p", "p → ~p", "~p → p"] }, correct: { ar: "p ∨ ~p", en: "p ∨ ~p" } },
        { text: { ar: "العبارة p ↔ q تكون صحيحة عندما:", en: "p ↔ q is true when:" }, options: { ar: ["p و q مختلفان", "p و q متماثلان", "p صحيحة فقط", "q صحيحة فقط"], en: ["p and q are different", "p and q are the same", "p is true only", "q is true only"] }, correct: { ar: "p و q متماثلان", en: "p and q are the same" } }
    ],
    lec3: [
        { text: { ar: "الرمز ∀ يعني:", en: "The symbol ∀ means:" }, options: { ar: ["يوجد", "لكل", "بعض", "لا يوجد"], en: ["There exists", "For all", "Some", "There is no"] }, correct: { ar: "لكل", en: "For all" } },

function getRandomQuestions(arr, count) {
    let shuffled = [...arr];
    for (let i = shuffled.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, count);
}

function submitMcqExam() {
    let correctCount = 0;
    let wrongList = [];
    
    for (let i = 0; i < currentMcqQuestions.length; i++) {
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        let userAnswer = selected ? selected.value : "";
        let correctAnswer = currentMcqQuestions[i].correct[currentLang];
        
        if (userAnswer === correctAnswer) {
            correctCount++;
        } else {
            wrongList.push({
                question: currentMcqQuestions[i].text[currentLang],
                correct: correctAnswer,
                user: userAnswer || (currentLang === "ar" ? "لم يتم الاختيار" : "No answer selected")
            });
        }
    }
    
    let percentage = (correctCount / currentMcqQuestions.length) * 100;
    let resultHTML = `<div class="result-box">
        <h3>${currentLang === "ar" ? "نتيجتك:" : "Your Score:"} ${correctCount} / ${currentMcqQuestions.length}</h3>
        <h2>${percentage.toFixed(1)}%</h2>`;
    
    if (wrongList.length > 0) {
        resultHTML += `<hr><h4>❌ ${currentLang === "ar" ? "الأخطاء والتصحيح:" : "Mistakes & Corrections:"}</h4>`;
        wrongList.forEach(w => {
            resultHTML += `<div class="mistake-item">
                <strong>📌 ${w.question}</strong><br>
                ✅ ${currentLang === "ar" ? "الإجابة الصحيحة:" : "Correct answer:"} ${w.correct}<br>
                ❌ ${currentLang === "ar" ? "إجابتك:" : "Your answer:"} ${w.user}
            </div>`;
        });
    } else {
        resultHTML += `<h4>🎉 ${currentLang === "ar" ? "ممتاز! جميع الإجابات صحيحة" : "Perfect! All answers are correct"} 🎉</h4>`;
    }
    
    resultHTML += `</div>`;
    document.getElementById('resultArea').innerHTML = resultHTML;
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

function submitEssayExam() {
    let comparisons = [];
    
    for (let i = 0; i < currentEssayQuestions.length; i++) {
        let userAnswer = document.getElementById(`essay_${i}`)?.value || "";
        let modelAnswer = currentEssayQuestions[i].modelAnswer[currentLang];
        
        comparisons.push({
            question: currentEssayQuestions[i].text[currentLang],
            userAnswer: userAnswer || (currentLang === "ar" ? "لم تتم كتابة إجابة" : "No answer written"),
            modelAnswer: modelAnswer
        });
    }
    
    let resultHTML = `<div class="result-box">
        <h3>📝 ${currentLang === "ar" ? "مقارنة الإجابات المقالية" : "Essay Answers Comparison"}</h3>
        <p>${currentLang === "ar" ? "قارن إجابتك مع الحل النموذجي لكل سؤال:" : "Compare your answer with the model answer for each question:"}</p>`;
    
    comparisons.forEach((c, idx) => {
        resultHTML += `<div class="essay-compare">
            <strong>📌 ${idx+1}. ${c.question}</strong>
            <div class="user-ans"><strong>✍️ ${currentLang === "ar" ? "إجابتك:" : "Your answer:"}</strong><br>${c.userAnswer}</div>
            <div class="correct-ans"><strong>✅ ${currentLang === "ar" ? "الحل النموذجي:" : "Model answer:"}</strong><br>${c.modelAnswer}</div>
            <hr>
        </div>`;
    });
    
    resultHTML += `<br><p>${currentLang === "ar" ? "💡 ملاحظة: قارن إجابتك مع الحل النموذجي لتتعلم الأخطاء وتحسن إجاباتك." : "💡 Note: Compare your answer with the model answer to learn from mistakes and improve."}</p>`;
    resultHTML += `</div>`;
    
    document.getElementById('resultArea').innerHTML = resultHTML;
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

// ==================== دوال التحكم ====================
function setExamType(type) {
    currentExamType = type;
    renderExam();
}

function refreshExam() {
    renderExam();
}

function setCurrentPage(page) {
    currentPage = page;
    const container = document.getElementById('main-container');
    
    if (page === 'home') {
        container.innerHTML = renderHome();
    } else if (page === 'summary') {
        container.innerHTML = renderSummary();
    } else if (page === 'exam') {
        renderExam();
    }
    
    document.querySelectorAll('.nav-btn').forEach(btn => {
        if (btn.dataset.page === page) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
}

// ==================== أحداث المستمع ====================
document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        currentLang = btn.dataset.lang;
        updateLanguage();
    });
});

document.getElementById('lectureSelect').addEventListener('change', (e) => {
    currentLecture = e.target.value;
    if (currentPage === 'summary') {
        setCurrentPage('summary');
    } else if (currentPage === 'exam') {
        renderExam();
    }
});

document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        setCurrentPage(btn.dataset.page);
    });
});
// ==================== التشغيل الأولي ====================
// تهيئة الصفحة الرئيسية
setCurrentPage('home');

// التأكد من تحميل اللغة بشكل صحيح
setTimeout(() => {
    updateLanguage();
}, 100);
</script>
